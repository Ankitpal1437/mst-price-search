<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}MST Ceramic World{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand">
      <span class="brand-mark">M</span>
      <span class="brand-text">
        <strong>MST CERAMIC WORLD</strong>
        <small>Jaquar Authorised Dealer · Kalyan-W</small>
      </span>
    </a>
    <nav class="nav-pills" id="nav-pills">
      <a href="/" data-path="/">Search</a>
      <a href="/quotation" data-path="/quotation">Quotation</a>
      <a href="/crm" data-path="/crm">Visitors &amp; CRM</a>
    </nav>
  </div>
</header>

<main class="page-shell">
  {% block content %}{% endblock %}
</main>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/common.js') }}"></script>
{% block extra_js %}{% endblock %}
<script>
  (function(){
    var path = window.location.pathname;
    document.querySelectorAll('#nav-pills a').forEach(function(a){
      if (a.getAttribute('data-path') === path) a.classList.add('active');
    });
  })();
</script>
</body>
</html>
